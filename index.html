<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools — Josh Janssen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: #080808;
    color: #f2ede6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 24px 60px;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    text-align: center;
    margin-bottom: 56px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }

  .header p {
    color: #777;
    font-size: 15px;
    font-weight: 400;
  }

  .tools-grid {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .tool-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #111;
    border: 1px solid #222;
    border-radius: 16px;
    padding: 20px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
  }

  .tool-card:hover {
    border-color: #333;
    background: #151515;
    transform: translateY(-1px);
  }

  .tool-card:active { transform: scale(0.99); }

  .tool-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .tool-info {
    flex: 1;
    min-width: 0;
  }

  .tool-info h2 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 3px;
  }

  .tool-info p {
    font-size: 13px;
    color: #777;
    line-height: 1.4;
  }

  .tool-arrow {
    color: #444;
    font-size: 18px;
    flex-shrink: 0;
  }

  .footer {
    margin-top: 60px;
    font-size: 12px;
    color: #333;
  }
</style>
</head>
<body>

  <div class="header">
    <h1>Tools</h1>
    <p>Things I've built for people.</p>
  </div>

  <div class="tools-grid">

    <a href="sacred-words/" class="tool-card">
      <div class="tool-icon" style="background: linear-gradient(135deg, #c8a44e, #8a6e2f);">✦</div>
      <div class="tool-info">
        <h2>Sacred Words</h2>
        <p>Swipe through Bah&aacute;&rsquo;&iacute; quotes and pick your favorites.</p>
      </div>
      <div class="tool-arrow">&rarr;</div>
    </a>

    <!-- Add more tools here as cards -->

  </div>

  <div class="footer">Josh Janssen</div>

</body>
</html>
